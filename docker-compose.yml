version: '3.8'

services:
  notes-maker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notes-maker
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=./data/notes.db
      - NEXT_PUBLIC_APP_NAME=Notes Maker
      - PORT=3000
    volumes:
      - notes_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  notes_data:
    driver: local
